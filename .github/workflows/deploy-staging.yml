name: Deploy to staging
'on':
  workflow_dispatch: {}
env:
  DEST: staging
  SERVICE: vmkit-test-minimal-staging
  REGISTRY: ghcr.io
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/badri/vmkit-test-minimal:${{ github.sha }},ghcr.io/badri/vmkit-test-minimal:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Install Kamal
      run: gem install kamal
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VMKIT_SSH_PRIVATE_KEY }}
    - name: Resolve VM host
      id: resolve
      run: 'HOST=$(curl -sf -H "Authorization: Bearer ${{ secrets.VMKIT_SERVICE_KEY }}" "https://gateway.vmkit.dev/api/internal/instances/by-dest/staging/host")

        echo "host=$HOST" >> "$GITHUB_OUTPUT"

        ssh-keygen -R "$HOST" 2>/dev/null || true

        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts'
    - name: Render Kamal secrets
      run: envsubst < .kamal/secrets.staging.tpl > .kamal/secrets.staging
      env:
        DEST_VM_HOST: ${{ steps.resolve.outputs.host }}
        KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    - name: Substitute DEST_VM_HOST in Kamal config
      run: sed -i "s|\$DEST_VM_HOST|${DEST_VM_HOST}|g" config/deploy.staging.yml
      env:
        DEST_VM_HOST: ${{ steps.resolve.outputs.host }}
    - name: Deploy with Kamal
      run: kamal deploy -d staging
      env:
        DEST_VM_HOST: ${{ steps.resolve.outputs.host }}
